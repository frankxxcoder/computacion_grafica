<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea Dinámica con Plano Cartesiano</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { background-color: #f9f9f9; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h2>Línea Dinámica: Desarrollado por Frank Diego Gonzales Pantoja</h2>
    <canvas id="myCanvas" width="800" height="400" style="border: 1px solid #ccc;"></canvas>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    var xstart = 0; 
    var xend = canvas.width; 
    var step = 1; // Un paso de 1 es suficiente para rendimiento y suavidad
    var time = 0; 

    function drawCartesianPlane() {
        ctx.strokeStyle = "#bbb"; // Color gris claro para los ejes
        ctx.lineWidth = 1;
        ctx.font = "12px Arial";
        ctx.fillStyle = "#888";

        // Eje X (Horizontal)
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();

        // Eje Y (Vertical - al inicio)
        ctx.beginPath();
        ctx.moveTo(40, 0);
        ctx.lineTo(40, canvas.height);
        ctx.stroke();

        // Marcas y etiquetas simples
        ctx.fillText("X", canvas.width - 15, canvas.height / 2 - 10);
        ctx.fillText("Y", 50, 20);
        ctx.fillText("0", 30, canvas.height / 2 + 15);
    }

    function drawGraph() {
        // 1. Limpiar el lienzo
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        // 2. Dibujar el plano de fondo
        drawCartesianPlane();

        // 3. Dibujar la función sinusoidal
        ctx.beginPath();
        ctx.strokeStyle = '#007bff'; // Azul vibrante
        ctx.lineWidth = 3; 
        
        for (var x = xstart; x < xend; x += step) {
            // Ajustamos la frecuencia (0.02) y la amplitud (80)
            var y = Math.sin(x * 0.02 + time); 

            // Calculamos la posición real en el canvas
            // canvas.height/2 es el "suelo" de la gráfica
            var canvasY = canvas.height / 2 - (y * 80);

            if (x === xstart) {
                ctx.moveTo(x, canvasY);
            } else {
                ctx.lineTo(x, canvasY);
            }
        }
        ctx.stroke(); 
    }

    function animate() {
        drawGraph();   
        time -= 0.05; // Velocidad de la animación
        requestAnimationFrame(animate); 
    }

    animate(); 
</script>  
</body>
</html>
