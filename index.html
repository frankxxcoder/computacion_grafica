<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Programación</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-left: 5px solid #3498db;
            transition: transform 0.2s;
            cursor: pointer;
        }
        li:hover {
            transform: translateX(10px);
            background: #eef2f7;
        }
        a {
            text-decoration: none;
            color: #2980b9;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 Índice de Programación</h2>
    <ul id="indice-lista"></ul>
</div>

<script>
    // 1. Definimos los temas en un arreglo de objetos
    const temas = [
        { titulo: "Fundamentos de Lógica", link: "#logica" },
        { titulo: "HTML5 y Estructura Web", link: "#html" },
        { titulo: "CSS3 y Diseño Responsivo", link: "#css" },
        { titulo: "JavaScript Moderno (ES6+)", link: "#js" },
        { titulo: "Estructuras de Datos", link: "#datos" },
        { titulo: "Bases de Datos SQL y NoSQL", link: "#db" },
        { titulo: "APIs y Microservicios", link: "#api" },
        { titulo: "Despliegue (Cloud & CI/CD)", link: "#deploy" }
    ];

    // 2. Referenciamos el elemento del DOM
    const listaUl = document.getElementById('indice-lista');

    // 3. Función para renderizar el índice
    function generarIndice() {
        temas.forEach(tema => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${tema.link}">${tema.titulo}</a>`;
            listaUl.appendChild(li);
        });
    }

    // 4. Ejecutamos la función al cargar la página
    generarIndice();
</script>

</body>
</html>
