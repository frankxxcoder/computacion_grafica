<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Frank Diego</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-color: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --hover-color: #1f242c;
            --font-mono: 'Fira Code', 'Cascadia Code', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-mono), 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        header {
            background-color: var(--sidebar-color);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        h1 { font-size: 14px; margin: 0; font-weight: 400; color: var(--accent-color); }

        .main-content { display: flex; flex: 1; }

        /* --- Estilos del Menú Lateral --- */
        nav {
            width: 260px;
            background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-title {
            padding: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
        }

        .nav-links { list-style: none; padding: 0; margin: 0; }

        /* Estilo para los botones que abren carpetas */
        .folder-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 10px 20px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .folder-btn:hover { background-color: var(--hover-color); }
        
        /* Icono de flecha para las carpetas */
        .folder-btn::before {
            content: '▸';
            margin-right: 8px;
            display: inline-block;
            transition: transform 0.2s;
        }

        .folder-btn.open::before { transform: rotate(90deg); }

        /* Submenú oculto por defecto */
        .submenu {
            display: none;
            list-style: none;
            padding-left: 20px; /* Indentación para subarchivos */
            background-color: #0d1117;
        }

        .submenu.show { display: block; }

        .nav-links li a {
            display: block;
            padding: 8px 20px;
            color: #8b949e;
            text-decoration: none;
            font-size: 12px;
            border-left: 2px solid transparent;
            transition: 0.2s;
        }

        .nav-links li a:hover { color: white; background-color: var(--hover-color); }
        .nav-links li a.active {
            color: var(--accent-color);
            border-left: 2px solid var(--accent-color);
        }

        /* --- Visualizador --- */
        .viewer { flex: 1; background-color: #ffffff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        footer {
            background-color: var(--accent-color);
            color: #000;
            padding: 2px 15px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="user-info">
            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            <span style="margin-left: 10px;">root@frank-diego: ~ /projects</span>
        </div>
        <h1>Developer: Frank Diego Gonzales Pantoja</h1>
    </header>

    <div class="main-content">
        <nav>
            <div class="nav-title">Explorador</div>
            <ul class="nav-links">
                <li><a href="#" onclick="loadPage('home.html', this)" class="active">index.txt</a></li>
                <!--<li><a href="#" onclick="loadPage('ejercicion1.html', this)">tarea_01.html</a></li>-->
                
                <li>
                    <button class="folder-btn" onclick="toggleFolder('menu5', this)">Actividad Número 5</button>
                    <ul id="menu5" class="submenu">
                        <li><a href="#" onclick="loadPage('ejercicion1.html', this)">/ tarea1.html</a></li>
                        <li><a href="#" onclick="loadPage('ejercicion2.html', this)">/ tarea2.html</a></li>
						<li><a href="#" onclick="loadPage('ejercicion3.html', this)">/ tarea3.html</a></li>
                        </ul>
                </li>

                <li>
                    <button class="folder-btn" onclick="toggleFolder('menu6', this)">Actividad Número 6</button>
                    <ul id="menu6" class="submenu">
                        <li><a href="#" onclick="loadPage('n6/curvas_parametricas.html', this)">/ CURVAS PARAMETRICAS</a></li>
                        <li><a href="#" onclick="loadPage('n6/mallas_poligonales.html', this)">/ MALLAS POLIGONALES</a></li>
                        </ul>
                </li>
            </ul>
        </nav>

        <div class="viewer">
            <iframe id="content-frame" src="about:blank"></iframe>
        </div>
    </div>

    <footer>
        <div>UTF-8 | HTML/CSS/JS</div>
        <div>Frank Diego Gonzales Pantoja &copy; 2026</div>
    </footer>
</div>

<script>
    // Función para mostrar/ocultar carpetas
    function toggleFolder(menuId, btn) {
        const menu = document.getElementById(menuId);
        menu.classList.toggle('show');
        btn.classList.toggle('open');
    }

    // Función original modificada para manejar la clase active correctamente
    function loadPage(pageUrl, element) {
        document.getElementById('content-frame').src = pageUrl;
        
        // Quitar clase active de todos los links
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.classList.remove('active');
        });
        
        // Agregar active al actual
        element.classList.add('active');
    }

    window.onload = () => {
        const frame = document.getElementById('content-frame').contentWindow.document;
        frame.open();
        frame.write(`
            <body style="background:#0d1117; color:#58a6ff; font-family:monospace; display:flex; justify-content:center; align-items:center; height:90vh; flex-direction:column;">
                <h2>> Repositorio Organizado</h2>
                <p style="color:#c9d1d9">Haz clic en las actividades para desplegar los archivos.</p>
            </body>
        `);
        frame.close();
    };
</script>

</body>
</html>
