<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformaciones 3D: Traslación, Rotación y Escalado</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #instrucciones {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; /* Para que no interfiera con el ratón si se añade en el futuro */
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4CAF50; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="instrucciones">
        <h1>Controles del cubo 3D</h1>
        <ul>
            <li><strong>Traslación:</strong> Flechas del teclado (Mover en X y Z)</li>
            <li><strong>Rotación:</strong> Teclas W, S, A, D (Girar en ejes X e Y)</li>
            <li><strong>Escalado:</strong> Teclas + y - (Aumentar / Reducir)</li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        
        const escena = new THREE.Scene();
        
        
        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camara.position.set(0, 3, 6); 
        camara.lookAt(0, 0, 0);       

        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderizador.domElement);

       
        const cuadricula = new THREE.GridHelper(20, 20);
        escena.add(cuadricula);

        
        const geometria = new THREE.BoxGeometry(1, 1, 1);
        
        const material = new THREE.MeshNormalMaterial(); 
        const cubo = new THREE.Mesh(geometria, material);
        cubo.position.y = 0.5; 
        escena.add(cubo);

        
        const velocidadTraslacion = 0.2;
        const velocidadRotacion = 0.1;
        const velocidadEscalado = 0.1;

        
        window.addEventListener('keydown', (evento) => {
            switch(evento.key) {
                
                case 'ArrowUp':
                    cubo.position.z -= velocidadTraslacion;
                    break;
                case 'ArrowDown':
                    cubo.position.z += velocidadTraslacion;
                    break;
                case 'ArrowLeft':
                    cubo.position.x -= velocidadTraslacion;
                    break;
                case 'ArrowRight':
                    cubo.position.x += velocidadTraslacion;
                    break;

                
                case 'w':
                case 'W':
                    cubo.rotation.x -= velocidadRotacion;
                    break;
                case 's':
                case 'S':
                    cubo.rotation.x += velocidadRotacion;
                    break;
                case 'a':
                case 'A':
                    cubo.rotation.y -= velocidadRotacion;
                    break;
                case 'd':
                case 'D':
                    cubo.rotation.y += velocidadRotacion;
                    break;

                
                case '+':
                    
                    cubo.scale.addScalar(velocidadEscalado); 
                    break;
                case '-':
                    
                    if (cubo.scale.x > 0.2) {
                        cubo.scale.addScalar(-velocidadEscalado);
                    }
                    break;
            }
        });

        
        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });

       
        function animar() {
            requestAnimationFrame(animar);
            
            renderizador.render(escena, camara);
        }

        
        animar();
    </script>
</body>
</html>
