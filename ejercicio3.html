<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curva Coseno Dinámica</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #e94560;
        }

        canvas {
            background-color: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            margin-top: 15px;
            text-align: center;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h2>Función Dinámica: y = \cos(x)</h2>
    
    <canvas id="canvasCoseno" width="600" height="300"></canvas>

    <div class="info">
        <p>Realizado por Frank Diego Gonzales Pantoja</p>
    </div>

    <script>
        const canvas = document.getElementById('canvasCoseno');
        const ctx = canvas.getContext('2d');

        // Configuración de la onda
        let desplazamiento = 0; // Esto hará que la onda "se mueva"
        const amplitud = 80;    // Qué tan alta es la onda
        const frecuencia = 0.05; // Qué tan juntas están las ondas

        function dibujarEscenario() {
            // Limpiar lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Eje X (Línea central)
            ctx.strokeStyle = '#0f3460';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function dibujarCurva() {
            dibujarEscenario();

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 3;
            ctx.beginPath();

            // Recorremos el ancho del canvas píxel por píxel
            for (let x = 0; x < canvas.width; x++) {
                // Calculamos el valor de Y usando la función coseno
                // y = cos(x * frecuencia + desplazamiento)
                // Multiplicamos por amplitud para que sea visible
                // Sumamos canvas.height/2 para centrarla verticalmente
                const y = (canvas.height / 2) + Math.cos(x * frecuencia + desplazamiento) * amplitud;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        function actualizar() {
            // Incrementamos el desplazamiento para simular movimiento
            desplazamiento += 1; 
            dibujarCurva();
        }

        // Ejecutar actualización cada segundo (1000ms)
        setInterval(actualizar, 1000);

        // Dibujo inicial
        dibujarCurva();
    </script>
</body>
</html>
