<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Barras Dinámico</title>
    <style>
        /* --- ESTILOS CSS --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        h2 { color: #333; margin-bottom: 20px; }

        #chart-container {
            display: flex;
            align-items: flex-end; /* Alinea las barras al fondo */
            justify-content: space-around;
            width: 500px;
            height: 300px;
            background-color: white;
            border-bottom: 3px solid #333;
            border-left: 3px solid #333;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 5px;
        }

        .bar {
            width: 60px;
            background: linear-gradient(to top, #3498db, #2980b9);
            transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Rebote suave */
            position: relative;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: center;
        }

        /* Etiqueta del valor encima de la barra */
        .bar span {
            position: absolute;
            top: -25px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Realizado por Frank Diego Gonzales Pantoja</h2>
    
    <div id="chart-container">
        <div class="bar"><span>0</span></div>
        <div class="bar"><span>0</span></div>
        <div class="bar"><span>0</span></div>
        <div class="bar"><span>0</span></div>
        <div class="bar"><span>0</span></div>
    </div>

    <script>
        /* --- LÓGICA JAVASCRIPT --- */

        // 1. Seleccionamos todas las barras
        const bars = document.querySelectorAll('.bar');

        function actualizarGrafico() {
            bars.forEach(bar => {
                // 2. Generar valor aleatorio entre 10 y 100
                const valorAleatorio = Math.floor(Math.random() * (100 - 10 + 1)) + 10;

                // 3. Actualizar la altura visual (usando el valor como porcentaje)
                bar.style.height = `${valorAleatorio}%`;

                // 4. Actualizar el texto del número dentro del span
                bar.querySelector('span').innerText = valorAleatorio;

                // Extra: Cambiar color si el valor es muy alto (alerta)
                if (valorAleatorio > 85) {
                    bar.style.background = "linear-gradient(to top, #e74c3c, #c0392b)";
                } else {
                    bar.style.background = "linear-gradient(to top, #3498db, #2980b9)";
                }
            });
        }

        // 5. Configurar el intervalo para que corra cada 1000ms (1 segundo)
        setInterval(actualizarGrafico, 1000);

        // Llamada inicial para que no empiece en cero
        actualizarGrafico();
    </script>
</body>
</html>
