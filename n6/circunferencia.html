<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Curva Paramétrica: Circunferencia</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        canvas { background: white; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controls { margin: 20px; padding: 15px; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Interacción: Circunferencia Paramétrica</h2>
    
    <div class="controls">
        <label>Radio (r): <input type="range" id="radius" min="10" max="150" value="100"></label>
        <span id="rVal">100</span>
    </div>

    <canvas id="canvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rInput = document.getElementById('radius');
        const rVal = document.getElementById('rVal');

        let t = 0; // Parámetro t

        function draw() {
            const r = parseInt(rInput.value);
            rVal.innerText = r;

            // Limpiar y centrar
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            // Dibujar ejes
            ctx.strokeStyle = '#ddd';
            ctx.beginPath(); ctx.moveTo(-200, 0); ctx.lineTo(200, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -200); ctx.lineTo(0, 200); ctx.stroke();

            // Dibujar la trayectoria completa (tenue)
            ctx.strokeStyle = '#eee';
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.stroke();

            // Calcular coordenadas paramétricas
            let x = r * Math.cos(t);
            let y = r * Math.sin(t);

            // Dibujar vector desde el origen
            ctx.strokeStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.lineTo(x, -y); // -y porque el eje Y en canvas crece hacia abajo
            ctx.stroke();

            // Dibujar punto actual
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(x, -y, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            t += 0.03; // Incrementar el parámetro
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
